spring.application.name=hostel-management
server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/hostel_db
spring.datasource.username=postgres
spring.datasource.password=Subhashini@123
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

app.jwt.secret=CHANGE_THIS_TO_A_LONG_RANDOM_SECRET_KEY_12345678901234567890
app.jwt.expiration=86400000
app.upload.dir=uploads

spring.web.resources.static-locations=file:uploads/
management.endpoints.web.exposure.include=health,info
